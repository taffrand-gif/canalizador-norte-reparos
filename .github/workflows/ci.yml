name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - run: node --version
    - run: npm --version

    - name: Install dependencies
      run: npm install --legacy-peer-deps 2>&1 | tail -10

    - name: Build
      run: npm run build 2>&1 | tail -5
