name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'false'

    - run: node --version && npm --version

    - name: Install dependencies
      run: |
        echo "=== Starting install ==="
        npm install --prefer-offline 2>&1 | tail -20
      shell: bash

    - name: Build
      run: npm run build
